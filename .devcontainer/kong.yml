_format_version: "1.1"

services:
  - name: auth-v1-open
    url: http://supabase-auth:9999/
    plugins:
      - name: cors
    routes:
      - name: auth-v1-open
        strip_path: true
        paths:
          - /auth/v1/
  - name: auth-v1-open-callback
    url: http://supabase-auth:9999/callback
    plugins:
      - name: cors
    routes:
      - name: auth-v1-open-callback
        strip_path: true
        paths:
          - /auth/v1/callback
  - name: auth-v1-open-authorize
    url: http://supabase-auth:9999/authorize
    plugins:
      - name: cors
    routes:
      - name: auth-v1-open-authorize
        strip_path: true
        paths:
          - /auth/v1/authorize
  - name: postgrest
    url: http://supabase-rest:3000/
    plugins:
      - name: cors
      - name: key-auth
        config:
          hide_credentials: false
    routes:
      - name: rest-v1
        strip_path: true
        paths:
          - /rest/v1/
  - name: realtime-v1
    url: http://supabase-realtime:4000/socket
    routes:
      - name: realtime-v1
        strip_path: true
        paths:
          - /realtime/v1/
  - name: storage-v1
    url: http://supabase-storage:5000/
    plugins:
      - name: cors
    routes:
      - name: storage-v1
        strip_path: true
        paths:
          - /storage/v1/
  - name: functions-v1
    url: http://supabase-functions:9000/
    plugins:
      - name: cors
    routes:
      - name: functions-v1
        strip_path: true
        paths:
          - /functions/v1/
  - name: analytics-v1
    url: http://supabase-analytics:4000/api/
    plugins:
      - name: cors
      - name: key-auth
        config:
          hide_credentials: false
    routes:
      - name: analytics-v1
        strip_path: true
        paths:
          - /analytics/v1/

