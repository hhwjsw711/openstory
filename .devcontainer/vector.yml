data_dir: /tmp/vector

sources:
  docker_host:
    type: docker_logs

transforms:
  supabase_logs:
    type: remap
    inputs:
      - docker_host
    source: |
      # Only include logs from services that start with "supabase-"
      if !starts_with!(.label.\"com.docker.compose.service\", \"supabase-\") {
        abort
      }
      
      . = merge(., {
        "project": "default",
        "event_message": del(.message),
        "appname": del(.label.\"com.docker.compose.service\"),
        "timestamp": del(.timestamp),
      })

      del(.container_created_at)
      del(.container_id)
      del(.container_name)
      del(.source_type)
      del(.stream)
      del(.label)

sinks:
  supabase_sink:
    type: http
    inputs:
      - supabase_logs
    uri: http://supabase-analytics:4000/api/logs
    method: post
    healthcheck:
      enabled: false
    encoding:
      codec: json
    headers:
      Authorization: "Bearer your-super-secret-and-long-logflare-key"
      Content-Type: "application/json"
    request:
      retry_max_duration_secs: 10
      retry_initial_backoff_secs: 1
      retry_max_delay_secs: 10
      timeout_secs: 10