# .coderabbit.yaml (repo root, committed to default branch, e.g., main)
reviews:
  auto_review:
    enabled: true
    base_branches:
      - ".*"        # regex: allow ANY base/target branch
  review_drafts: true
  review_simple_changes: true
  path_includes:
    - "**"
  path_excludes: []

comments:
  enable_review_summary: true
  include_code_suggestions: true
