name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: bun install

      - name: Run type checking
        run: bun typecheck

      - name: Run linting
        run: bun lint

      - name: Check formatting
        run: bun format:check

      - name: Run tests
        run: bun test

  e2e:
    runs-on: ubuntu-latest

    services:
      qstash:
        image: public.ecr.aws/upstash/qstash:latest
        ports:
          - 8080:8080

    steps:
      - uses: actions/checkout@v5

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: bun install

      - name: Install Playwright browsers
        run: bunx playwright install --with-deps chromium

      - name: Setup test database
        run: |
          bun test:e2e:setup
          # Enable WAL mode for concurrent access from fixtures and dev server
          sqlite3 test.db "PRAGMA journal_mode=WAL;"

      - name: Run E2E tests
        run: bun test:e2e
        env:
          # QStash local dev server credentials (from upstash docs)
          QSTASH_TOKEN: eyJVc2VySUQiOiJkZWZhdWx0VXNlciIsIlBhc3N3b3JkIjoiZGVmYXVsdFBhc3N3b3JkIn0=
          QSTASH_URL: http://localhost:8080
          QSTASH_CURRENT_SIGNING_KEY: sig_7kYjw48mhY7kAjqNGcy6cr29RJ6r
          QSTASH_NEXT_SIGNING_KEY: sig_5ZB6DVzB1wjE8S6rZ7eenA8Pdnhs
          # Mock values for services we don't actually call (mocked via Playwright)
          UPSTASH_REDIS_REST_URL: http://localhost:9999
          UPSTASH_REDIS_REST_TOKEN: mock-redis-token
          GOOGLE_CLIENT_ID: mock-google-client-id
          GOOGLE_CLIENT_SECRET: mock-google-client-secret
          FAL_KEY: mock-fal-key
          R2_ACCOUNT_ID: mock-r2-account
          R2_ACCESS_KEY_ID: mock-r2-access-key
          R2_SECRET_ACCESS_KEY: mock-r2-secret
          R2_BUCKET_NAME: mock-bucket
          R2_PUBLIC_STORAGE_DOMAIN: mock.r2.dev
          RESEND_API_KEY: mock-resend-key
          EMAIL_FROM: test@example.com

      - name: Upload traces to R2
        if: failure()
        run: bun scripts/upload-e2e-traces.ts
        env:
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
          R2_PUBLIC_STORAGE_DOMAIN: ${{ secrets.R2_PUBLIC_STORAGE_DOMAIN }}
          GITHUB_RUN_ID: ${{ github.run_id }}

      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: e2e/results/
          retention-days: 7
