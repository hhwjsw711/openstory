name: Database CI

on:
  # Run migrations on pushes to main when schema files change
  push:
    branches:
      - main
    paths:
      - 'drizzle/**'
      - 'supabase/**'

  # Seed preview databases on all PRs (Supabase provides empty databases per branch)
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
    branches:
      - main

jobs:
  # Production: Run migrations on main branch
  migrate-production:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
    steps:
      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Get production database connection string
        run: supabase --experimental branches get main --project-ref "$SUPABASE_PROJECT_ID" -o env >> $GITHUB_ENV

      - uses: actions/checkout@v5

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Run migrations
        run: bun db:migrate
        env:
          POSTGRES_URL: ${{ env.POSTGRES_URL }}

  # Preview: Wait for Supabase Preview check, then seed database
  wait-for-preview:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    outputs:
      status: ${{ steps.check.outputs.conclusion }}
    steps:
      - uses: fountainhead/action-wait-for-check@v1.2.0
        id: check
        with:
          checkName: Supabase Preview
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          token: ${{ secrets.GITHUB_TOKEN }}

  seed-preview:
    needs:
      - wait-for-preview
    if: ${{ needs.wait-for-preview.outputs.status == 'success' }}
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
    steps:
      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Get preview branch connection string
        run: supabase --experimental branches get "$GITHUB_HEAD_REF" -o env >> $GITHUB_ENV

      - uses: actions/checkout@v5

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Seed preview database
        run: bun db:seed
        env:
          POSTGRES_URL: ${{ env.POSTGRES_URL }}
