name: Database CI

on:
  # Run migrations on pushes to main when schema files change
  push:
    branches:
      - main
    paths:
      - 'drizzle/**'
      - 'src/lib/db/schema/**'
      - '.github/workflows/database-ci.yml'

  # Create and cleanup preview databases on PRs
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      - closed
    branches:
      - main

permissions:
  contents: read
  pull-requests: write

jobs:
  # Production: Run migrations on main branch
  migrate-production:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v5

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Run migrations
        run: bun db:migrate
        env:
          TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
          TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}

      - name: Seed production database
        run: bun db:seed
        env:
          TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
          TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}

  # Preview: Create Turso branch database and configure platforms
  preview-database:
    if: github.event_name == 'pull_request' && github.event.action != 'closed'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Generate sanitized branch name
        id: branch_name
        run: |
          BRANCH_NAME="${{ github.head_ref }}"
          # Convert to lowercase, remove non-alphanumeric, limit to 32 chars
          SANITIZED=$(echo "$BRANCH_NAME" | tr -cd '[:alnum:]-' | sed 's/./\L&/g' | cut -c 1-32)
          # Remove trailing hyphens
          SANITIZED=$(echo "$SANITIZED" | sed 's/-*$//')
          DB_NAME="velro-preview-${SANITIZED}"
          echo "db_name=$DB_NAME" >> $GITHUB_OUTPUT
          echo "Preview database name: $DB_NAME"

      - name: Create Turso branch database
        id: create_db
        run: |
          DB_NAME="${{ steps.branch_name.outputs.db_name }}"
          PROD_DB_NAME="${{ secrets.TURSO_PRODUCTION_DB_NAME }}"

          # Check if database already exists
          EXISTING_DB=$(curl -s \
            -H "Authorization: Bearer ${{ secrets.TURSO_API_TOKEN }}" \
            "https://api.turso.tech/v1/organizations/${{ secrets.TURSO_ORG }}/databases/$DB_NAME" \
            | jq -r '.database.Name // empty')

          if [ "$EXISTING_DB" = "$DB_NAME" ]; then
            echo "Database $DB_NAME already exists, skipping creation"
            echo "created=false" >> $GITHUB_OUTPUT
          else
            echo "Creating database $DB_NAME"

            # Build the request body - only include seed if production DB name is set
            if [ -n "$PROD_DB_NAME" ]; then
              echo "Seeding from production database: $PROD_DB_NAME"
              REQUEST_BODY="{\"name\": \"$DB_NAME\", \"group\": \"default\", \"seed\": {\"type\": \"database\", \"name\": \"$PROD_DB_NAME\"}}"
            else
              echo "Warning: TURSO_PRODUCTION_DB_NAME not set, creating empty database"
              REQUEST_BODY="{\"name\": \"$DB_NAME\", \"group\": \"default\"}"
            fi

            CREATE_RESPONSE=$(curl -s -X POST \
              -H "Authorization: Bearer ${{ secrets.TURSO_API_TOKEN }}" \
              -H "Content-Type: application/json" \
              -d "$REQUEST_BODY" \
              "https://api.turso.tech/v1/organizations/${{ secrets.TURSO_ORG }}/databases")

            # Check for errors in response
            ERROR=$(echo "$CREATE_RESPONSE" | jq -r '.error // empty')
            if [ -n "$ERROR" ]; then
              echo "Error creating database: $ERROR"
              echo "Full response: $CREATE_RESPONSE"
              exit 1
            fi

            echo "created=true" >> $GITHUB_OUTPUT
          fi

          # Wait for database to be ready (poll until ready)
          echo "Waiting for database to be ready..."
          MAX_RETRIES=30
          RETRY_COUNT=0
          DB_HOSTNAME=""

          while [ $RETRY_COUNT -lt $MAX_RETRIES ]; do
            DB_INFO=$(curl -s \
              -H "Authorization: Bearer ${{ secrets.TURSO_API_TOKEN }}" \
              "https://api.turso.tech/v1/organizations/${{ secrets.TURSO_ORG }}/databases/$DB_NAME")

            DB_HOSTNAME=$(echo "$DB_INFO" | jq -r '.database.Hostname // empty')

            if [ -n "$DB_HOSTNAME" ] && [ "$DB_HOSTNAME" != "null" ]; then
              echo "Database is ready!"
              break
            fi

            echo "Database not ready yet (attempt $((RETRY_COUNT + 1))/$MAX_RETRIES), waiting..."
            sleep 2
            RETRY_COUNT=$((RETRY_COUNT + 1))
          done

          if [ -z "$DB_HOSTNAME" ] || [ "$DB_HOSTNAME" = "null" ]; then
            echo "Error: Database did not become ready in time"
            echo "Last API Response: $DB_INFO"
            exit 1
          fi

          DB_URL="libsql://${DB_HOSTNAME}"
          echo "Database URL: $DB_URL"

          # Create auth token for the database
          TOKEN_RESPONSE=$(curl -s -X POST \
            -H "Authorization: Bearer ${{ secrets.TURSO_API_TOKEN }}" \
            "https://api.turso.tech/v1/organizations/${{ secrets.TURSO_ORG }}/databases/$DB_NAME/auth/tokens")

          DB_TOKEN=$(echo "$TOKEN_RESPONSE" | jq -r '.jwt')

          if [ -z "$DB_TOKEN" ] || [ "$DB_TOKEN" = "null" ]; then
            echo "Error: Failed to create database token"
            echo "API Response: $TOKEN_RESPONSE"
            exit 1
          fi

          echo "db_url=$DB_URL" >> $GITHUB_OUTPUT
          echo "::add-mask::$DB_TOKEN"
          echo "db_token=$DB_TOKEN" >> $GITHUB_OUTPUT

      - name: Run migrations on preview database
        run: bun db:migrate
        env:
          TURSO_DATABASE_URL: ${{ steps.create_db.outputs.db_url }}
          TURSO_AUTH_TOKEN: ${{ steps.create_db.outputs.db_token }}

      - name: Configure Railway preview environment
        continue-on-error: true
        run: |
          # Skip if Railway API token not configured
          if [ -z "$RAILWAY_API_TOKEN" ]; then
            echo "RAILWAY_API_TOKEN not configured, skipping"
            exit 0
          fi

          if [ -z "$RAILWAY_PROJECT_ID" ]; then
            echo "RAILWAY_PROJECT_ID not configured, skipping"
            exit 0
          fi

          echo "Configuring Railway environment variables via GraphQL API..."
          echo "Project ID: ${RAILWAY_PROJECT_ID:0:8}..."

          ENV_NAME="velro-pr-${{ github.event.pull_request.number }}"
          echo "Target environment: $ENV_NAME"

          # Get project details including service and environments
          PROJECT_RESPONSE=$(curl -s -X POST "https://backboard.railway.app/graphql/v2" \
            -H "Authorization: Bearer $RAILWAY_API_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"query":"query($projectId:String!){project(id:$projectId){services{edges{node{id}}}environments{edges{node{id name}}}}}","variables":{"projectId":"'"$RAILWAY_PROJECT_ID"'"}}')

          # Check for GraphQL errors
          if echo "$PROJECT_RESPONSE" | jq -e '.errors' > /dev/null 2>&1; then
            echo "Error: Railway API returned an error"
            echo "Response: $PROJECT_RESPONSE"
            echo ""
            echo "Troubleshooting:"
            echo "1. Verify RAILWAY_PROJECT_ID is correct (check Railway dashboard URL)"
            echo "2. Ensure RAILWAY_API_TOKEN is a workspace-level token with project access"
            echo "3. Check that the token hasn't expired"
            exit 1
          fi

          # Get service ID
          if [ -n "$RAILWAY_SERVICE_ID" ]; then
            echo "Using provided RAILWAY_SERVICE_ID: $RAILWAY_SERVICE_ID"
            SERVICE_ID="$RAILWAY_SERVICE_ID"
          else
            echo "RAILWAY_SERVICE_ID not provided, fetching first service from project..."
            SERVICE_ID=$(echo "$PROJECT_RESPONSE" | jq -r '.data.project.services.edges[0].node.id')
          fi

          if [ -z "$SERVICE_ID" ] || [ "$SERVICE_ID" = "null" ]; then
            echo "Error: Could not find service in project"
            echo "Response: $PROJECT_RESPONSE"
            exit 1
          fi

          echo "Found service: $SERVICE_ID"

          # Find environment by name using jq
          ENVIRONMENT_ID=$(echo "$PROJECT_RESPONSE" | jq -r ".data.project.environments.edges[] | select(.node.name == \"$ENV_NAME\") | .node.id")

          # If environment doesn't exist, create it
          if [ -z "$ENVIRONMENT_ID" ] || [ "$ENVIRONMENT_ID" = "null" ]; then
            echo "Environment $ENV_NAME not found, creating it..."
            CREATE_ENV_RESPONSE=$(curl -s -X POST "https://backboard.railway.app/graphql/v2" \
              -H "Authorization: Bearer $RAILWAY_API_TOKEN" \
              -H "Content-Type: application/json" \
              -d '{"query":"mutation($input:EnvironmentCreateInput!){environmentCreate(input:$input){id}}","variables":{"input":{"projectId":"'"$RAILWAY_PROJECT_ID"'","name":"'"$ENV_NAME"'"}}}')

            ENVIRONMENT_ID=$(echo "$CREATE_ENV_RESPONSE" | jq -r '.data.environmentCreate.id')

            if [ -z "$ENVIRONMENT_ID" ] || [ "$ENVIRONMENT_ID" = "null" ]; then
              echo "Error: Failed to create environment"
              echo "Response: $CREATE_ENV_RESPONSE"
              exit 1
            fi
            echo "Created environment with ID: $ENVIRONMENT_ID"
          else
            echo "Found existing environment with ID: $ENVIRONMENT_ID"
          fi

          # Set TURSO_DATABASE_URL using jq for proper JSON escaping
          PAYLOAD=$(jq -n \
            --arg projId "$RAILWAY_PROJECT_ID" \
            --arg envId "$ENVIRONMENT_ID" \
            --arg svcId "$SERVICE_ID" \
            --arg dbUrl "${{ steps.create_db.outputs.db_url }}" \
            '{
              query: "mutation($input:VariableUpsertInput!){variableUpsert(input:$input)}",
              variables: {
                input: {
                  projectId: $projId,
                  environmentId: $envId,
                  serviceId: $svcId,
                  name: "TURSO_DATABASE_URL",
                  value: $dbUrl
                }
              }
            }')

          curl -s -X POST "https://backboard.railway.app/graphql/v2" \
            -H "Authorization: Bearer $RAILWAY_API_TOKEN" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD"

          # Set TURSO_AUTH_TOKEN using jq for proper JSON escaping
          PAYLOAD=$(jq -n \
            --arg projId "$RAILWAY_PROJECT_ID" \
            --arg envId "$ENVIRONMENT_ID" \
            --arg svcId "$SERVICE_ID" \
            --arg dbToken "${{ steps.create_db.outputs.db_token }}" \
            '{
              query: "mutation($input:VariableUpsertInput!){variableUpsert(input:$input)}",
              variables: {
                input: {
                  projectId: $projId,
                  environmentId: $envId,
                  serviceId: $svcId,
                  name: "TURSO_AUTH_TOKEN",
                  value: $dbToken
                }
              }
            }')

          curl -s -X POST "https://backboard.railway.app/graphql/v2" \
            -H "Authorization: Bearer $RAILWAY_API_TOKEN" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD"

          echo "Railway environment variables configured successfully for $ENV_NAME"
        env:
          RAILWAY_API_TOKEN: ${{ secrets.RAILWAY_API_TOKEN }}
          RAILWAY_PROJECT_ID: ${{ secrets.RAILWAY_PROJECT_ID }}
          RAILWAY_SERVICE_ID: ${{ secrets.RAILWAY_SERVICE_ID }}

      - name: Configure Vercel preview environment
        continue-on-error: true
        run: |
          # Skip if Vercel token not configured
          if [ -z "$VERCEL_TOKEN" ]; then
            echo "Vercel token not configured, skipping"
            exit 0
          fi

          # Set environment variables for preview branch
          echo "${{ steps.create_db.outputs.db_url }}" | bunx vercel env add --token "$VERCEL_TOKEN" TURSO_DATABASE_URL preview "${{ github.head_ref }}"

          echo "${{ steps.create_db.outputs.db_token }}" | bunx vercel env add --token "$VERCEL_TOKEN" TURSO_AUTH_TOKEN preview "${{ github.head_ref }}"

        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Comment on PR
        uses: actions/github-script@v7
        with:
          script: |
            const dbName = '${{ steps.branch_name.outputs.db_name }}';
            const created = '${{ steps.create_db.outputs.created }}' === 'true';

            const body = `## 🗄️ Preview Database ${created ? 'Created' : 'Updated'}

            **Database**: \`${dbName}\`
            **Status**: ${created ? 'Seeded from production + migrations applied' : 'Migrations applied'}

            The preview database has been configured for Railway and Vercel preview environments.

            The database will be automatically destroyed when this PR is closed.`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });

  # Cleanup: Destroy Turso branch database when PR closes
  cleanup-preview:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    steps:
      - name: Generate sanitized branch name
        id: branch_name
        run: |
          BRANCH_NAME="${{ github.head_ref }}"
          # Convert to lowercase, remove non-alphanumeric, limit to 32 chars
          SANITIZED=$(echo "$BRANCH_NAME" | tr -cd '[:alnum:]-' | sed 's/./\L&/g' | cut -c 1-32)
          # Remove trailing hyphens
          SANITIZED=$(echo "$SANITIZED" | sed 's/-*$//')
          DB_NAME="velro-preview-${SANITIZED}"
          echo "db_name=$DB_NAME" >> $GITHUB_OUTPUT

      - name: Destroy Turso branch database
        continue-on-error: true
        run: |
          DB_NAME="${{ steps.branch_name.outputs.db_name }}"

          # Delete the database using Turso API
          echo "Destroying database $DB_NAME"
          curl -X DELETE \
            -H "Authorization: Bearer ${{ secrets.TURSO_API_TOKEN }}" \
            "https://api.turso.tech/v1/organizations/${{ secrets.TURSO_ORG }}/databases/$DB_NAME"

      - name: Delete Railway preview environment
        continue-on-error: true
        run: |
          # Skip if Railway API token not configured
          if [ -z "$RAILWAY_API_TOKEN" ]; then
            echo "RAILWAY_API_TOKEN not configured, skipping"
            exit 0
          fi

          if [ -z "$RAILWAY_PROJECT_ID" ]; then
            echo "RAILWAY_PROJECT_ID not configured, skipping"
            exit 0
          fi

          ENV_NAME="velro-pr-${{ github.event.pull_request.number }}"
          echo "Deleting Railway environment: $ENV_NAME"

          # Get project environments
          PROJECT_RESPONSE=$(curl -s -X POST "https://backboard.railway.app/graphql/v2" \
            -H "Authorization: Bearer $RAILWAY_API_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"query":"query($projectId:String!){project(id:$projectId){environments{edges{node{id name}}}}}","variables":{"projectId":"'"$RAILWAY_PROJECT_ID"'"}}')

          # Find environment by name
          ENVIRONMENT_ID=$(echo "$PROJECT_RESPONSE" | jq -r ".data.project.environments.edges[] | select(.node.name == \"$ENV_NAME\") | .node.id")

          if [ -z "$ENVIRONMENT_ID" ] || [ "$ENVIRONMENT_ID" = "null" ]; then
            echo "Environment $ENV_NAME not found, nothing to delete"
            exit 0
          fi

          echo "Found environment with ID: $ENVIRONMENT_ID"

          # Delete the environment
          DELETE_RESPONSE=$(curl -s -X POST "https://backboard.railway.app/graphql/v2" \
            -H "Authorization: Bearer $RAILWAY_API_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"query":"mutation($id:String!){environmentDelete(id:$id)}","variables":{"id":"'"$ENVIRONMENT_ID"'"}}')

          # Check for errors
          if echo "$DELETE_RESPONSE" | jq -e '.errors' > /dev/null 2>&1; then
            echo "Error deleting environment: $DELETE_RESPONSE"
            exit 1
          fi

          echo "Railway environment $ENV_NAME deleted successfully"
        env:
          RAILWAY_API_TOKEN: ${{ secrets.RAILWAY_API_TOKEN }}
          RAILWAY_PROJECT_ID: ${{ secrets.RAILWAY_PROJECT_ID }}

      - name: Comment on PR
        uses: actions/github-script@v7
        continue-on-error: true
        with:
          script: |
            const dbName = '${{ steps.branch_name.outputs.db_name }}';
            const envName = 'velro-pr-${{ github.event.pull_request.number }}';

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## 🗑️ Preview Environment Cleaned Up\n\n**Database**: \`${dbName}\` has been destroyed.\n**Railway Environment**: \`${envName}\` has been deleted.`
            });
