name: Database CI

on:
  # Run migrations on pushes to main when schema files change
  push:
    branches:
      - main
    paths:
      - 'drizzle/**'
      - 'src/lib/db/schema/**'
      - '.github/workflows/database-ci.yml'

  # Create and cleanup preview databases on PRs
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      - closed
    branches:
      - main

permissions:
  contents: read
  pull-requests: read

jobs:
  # Production: Run migrations on main branch
  migrate-production:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v5

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Run migrations
        run: bun db:migrate
        env:
          TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
          TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}

      - name: Seed production database
        run: bun db:seed
        env:
          TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
          TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}

  # Preview: Create Turso branch database and configure platforms
  preview-database:
    if: github.event_name == 'pull_request' && github.event.action != 'closed'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Install Turso CLI
        run: |
          curl -sSfL https://get.tur.so/install.sh | bash
          echo "$HOME/.turso/bin" >> $GITHUB_PATH

      - name: Authenticate with Turso
        run: turso auth api-token ${{ secrets.TURSO_API_TOKEN }}

      - name: Sanitize branch name for Turso
        id: sanitize
        run: |
          BRANCH_NAME="${{ github.head_ref }}"
          # Convert to lowercase and replace special chars with hyphens
          SANITIZED=$(echo "$BRANCH_NAME" | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9-]/-/g' | sed 's/--*/-/g' | sed 's/^-\|-$//g')
          DB_NAME="velro-preview-${SANITIZED}"
          echo "db_name=$DB_NAME" >> $GITHUB_OUTPUT
          echo "Preview database name: $DB_NAME"

      - name: Create Turso branch database
        id: create_db
        run: |
          DB_NAME="${{ steps.sanitize.outputs.db_name }}"

          # Check if database already exists
          if turso db show "$DB_NAME" 2>/dev/null; then
            echo "Database $DB_NAME already exists, skipping creation"
            echo "created=false" >> $GITHUB_OUTPUT
          else
            echo "Creating database $DB_NAME"
            turso db create "$DB_NAME" --org ${{ secrets.TURSO_ORG }}
            echo "created=true" >> $GITHUB_OUTPUT
          fi

          # Get database URL and auth token
          DB_URL=$(turso db show "$DB_NAME" --url)
          DB_TOKEN=$(turso db tokens create "$DB_NAME")

          echo "db_url=$DB_URL" >> $GITHUB_OUTPUT
          echo "::add-mask::$DB_TOKEN"
          echo "db_token=$DB_TOKEN" >> $GITHUB_OUTPUT

      - name: Run migrations on preview database
        run: bun db:migrate
        env:
          TURSO_DATABASE_URL: ${{ steps.create_db.outputs.db_url }}
          TURSO_AUTH_TOKEN: ${{ steps.create_db.outputs.db_token }}

      - name: Seed preview database
        run: bun db:seed
        env:
          TURSO_DATABASE_URL: ${{ steps.create_db.outputs.db_url }}
          TURSO_AUTH_TOKEN: ${{ steps.create_db.outputs.db_token }}

      - name: Configure Railway preview environment
        continue-on-error: true
        run: |
          # Skip if Railway token not configured
          if [ -z "$RAILWAY_TOKEN" ]; then
            echo "Railway token not configured, skipping"
            exit 0
          fi

          # Install Railway CLI
          curl -fsSL https://railway.app/install.sh | sh
          export PATH="$HOME/.railway/bin:$PATH"

          # Set environment variables for PR environment
          railway variables set \
            TURSO_DATABASE_URL="${{ steps.create_db.outputs.db_url }}" \
            TURSO_AUTH_TOKEN="${{ steps.create_db.outputs.db_token }}" \
            --environment "pr-${{ github.event.pull_request.number }}"
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

      - name: Configure Vercel preview environment
        continue-on-error: true
        run: |
          # Skip if Vercel token not configured
          if [ -z "$VERCEL_TOKEN" ]; then
            echo "Vercel token not configured, skipping"
            exit 0
          fi

          # Install Vercel CLI
          npm install -g vercel

          # Link to Vercel project
          vercel link --yes \
            --token="$VERCEL_TOKEN" \
            --scope="$VERCEL_ORG_ID" \
            --project="$VERCEL_PROJECT_ID"

          # Set environment variables for preview branch
          echo "${{ steps.create_db.outputs.db_url }}" | vercel env add TURSO_DATABASE_URL preview \
            --token="$VERCEL_TOKEN" \
            --yes || true

          echo "${{ steps.create_db.outputs.db_token }}" | vercel env add TURSO_AUTH_TOKEN preview \
            --token="$VERCEL_TOKEN" \
            --yes || true
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Comment on PR
        uses: actions/github-script@v7
        with:
          script: |
            const dbName = '${{ steps.sanitize.outputs.db_name }}';
            const created = '${{ steps.create_db.outputs.created }}' === 'true';

            const body = `## 🗄️ Preview Database ${created ? 'Created' : 'Updated'}

            **Database**: \`${dbName}\`
            **Status**: ${created ? 'Created and seeded' : 'Migrations and seeding applied'}

            The preview database has been configured for Railway and Vercel preview environments.

            The database will be automatically destroyed when this PR is closed.`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });

  # Cleanup: Destroy Turso branch database when PR closes
  cleanup-preview:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    steps:
      - name: Install Turso CLI
        run: |
          curl -sSfL https://get.tur.so/install.sh | bash
          echo "$HOME/.turso/bin" >> $GITHUB_PATH

      - name: Authenticate with Turso
        run: turso auth api-token ${{ secrets.TURSO_API_TOKEN }}

      - name: Sanitize branch name
        id: sanitize
        run: |
          BRANCH_NAME="${{ github.head_ref }}"
          SANITIZED=$(echo "$BRANCH_NAME" | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9-]/-/g' | sed 's/--*/-/g' | sed 's/^-\|-$//g')
          DB_NAME="velro-preview-${SANITIZED}"
          echo "db_name=$DB_NAME" >> $GITHUB_OUTPUT

      - name: Destroy Turso branch database
        continue-on-error: true
        run: |
          DB_NAME="${{ steps.sanitize.outputs.db_name }}"
          if turso db show "$DB_NAME" 2>/dev/null; then
            echo "Destroying database $DB_NAME"
            turso db destroy "$DB_NAME" --yes
          else
            echo "Database $DB_NAME does not exist, skipping"
          fi

      - name: Comment on PR
        uses: actions/github-script@v7
        continue-on-error: true
        with:
          script: |
            const dbName = '${{ steps.sanitize.outputs.db_name }}';

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## 🗑️ Preview Database Cleaned Up\n\nDatabase \`${dbName}\` has been destroyed.`
            });
