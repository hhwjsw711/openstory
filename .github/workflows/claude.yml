name: Claude PR Review with Progress Tracking

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]

concurrency:
  group: claude-review-${{ github.event.pull_request.head.sha }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  review-with-tracking:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # allow Claude to see previous commits for anti-repetition

      - name: PR Review with Progress Tracking
        uses: anthropics/claude-code-action@v1
        with:
          # ✅ Use direct API key auth (set this secret in repo/org secrets)
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}

          # ✅ Keep your progress tracker
          track_progress: true

          # Your custom review instructions
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            Perform a comprehensive code review with the following focus areas:

            1. **Code Quality**
               - Clean code principles and best practices
               - Proper error handling and edge cases
               - Code readability and maintainability

            2. **Security**
               - Check for potential security vulnerabilities
               - Validate input sanitization
               - Review authentication/authorization logic

            3. **Performance**
               - Identify potential performance bottlenecks
               - Review database queries for efficiency
               - Check for memory leaks or resource issues

            4. **Documentation**
               - Ensure code is properly documented
               - Verify README updates for new features
               - Check API documentation accuracy

            Provide detailed feedback using inline comments for specific issues.
            Use top-level comments for general observations or praise.

            CRITICAL: Anti-repetition rules:
            1. Read all existing review comments and git log on this PR first
            2. Do NOT repeat suggestions that have already been made
            3. If a previous suggestion was applied, acknowledge the fix instead of re-suggesting. Follow the following template:
              - File: index.py, Line 100: def main(args: list[str]) -> None: syntax error → Fixed (commit xxxxxx) - This is a syntax error in the function signature.
              - File: index.py, Line 5: synchronize trigger removal → Fixed (commit yyyyyy) - This is a synchronization trigger that was removed.
            4. Focus ONLY on new changes or previously unaddressed issues
            5. If no new issues are found, simply acknowledge the improvements made

          claude_args: >
            --allowedTools
            "mcp__github_inline_comment__create_inline_comment,
            Bash(gh issue view:*),
            Bash(gh search:*),
            Bash(gh issue list:*),
            Bash(gh pr comment:*),
            Bash(gh pr diff:*),
            Bash(gh pr view:*),
            Bash(gh pr list:*)"
