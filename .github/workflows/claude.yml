name: Claude PR Review with Progress Tracking

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]

concurrency:
  group: claude-review-${{ github.event.pull_request.head.sha }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  review-with-tracking:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # allow Claude to see previous commits for anti-repetition

      - name: PR Review with Progress Tracking
        uses: anthropics/claude-code-action@v1
        with:
          # ✅ Use direct API key auth (set this secret in repo/org secrets)
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}

          additional_permissions: |
            actions: read