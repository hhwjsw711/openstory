name: CI

on:
  push:
    branches: [main]
    paths:
      - 'apps/frontend/**'
      - '.github/workflows/ci.yml'
      - 'package.json'
  pull_request:
    branches: [main]
    paths:
      - 'apps/frontend/**'
      - '.github/workflows/ci.yml'
      - 'package.json'

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        working-directory: apps/frontend
        run: bun install

      - name: Run type checking
        working-directory: apps/frontend
        run: bun tsc --noEmit

      - name: Run linting
        working-directory: apps/frontend
        run: bun biome check .

      - name: Run tests
        working-directory: apps/frontend
        run: bun test
