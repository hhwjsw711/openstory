name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: bun install

      - name: Run type checking
        run: bun tsc --noEmit

      - name: Run linting
        run: bun lint

      - name: Check formatting
        run: bun format:check

      - name: Run tests
        run: bun test
