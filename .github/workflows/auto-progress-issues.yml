name: Auto Progress Issues

on:
  pull_request:
    types: [opened, reopened]

jobs:
  progress-issue:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    permissions:
      issues: read
      repository-projects: write
    steps:
      - name: Extract issue number from branch
        id: extract
        env:
          BRANCH: ${{ github.head_ref }}
        run: |
          if [[ "$BRANCH" =~ ^([0-9]+)- ]]; then
            echo "issue_number=${BASH_REMATCH[1]}" >> "$GITHUB_OUTPUT"
          else
            echo "No issue number in branch name: $BRANCH"
            echo "issue_number=" >> "$GITHUB_OUTPUT"
          fi

      - name: Move issue to In Progress
        if: steps.extract.outputs.issue_number != ''
        env:
          GH_TOKEN: ${{ secrets.PROJECT_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          ISSUE_NUMBER=${{ steps.extract.outputs.issue_number }}
          PROJECT_NUMBER=1
          ORG="openstory-so"
          STATUS_FIELD_ID="PVTSSF_lADODacWQM4BBrgJzg0HVm4"
          IN_PROGRESS_ID="47fc9ee4"

          # Get the project item ID for this issue
          ITEM_ID=$(gh project item-list "$PROJECT_NUMBER" \
            --owner "$ORG" \
            --format json \
            --jq ".items[] | select(.content.number == $ISSUE_NUMBER and .content.repository == \"$REPO\") | .id" \
            --limit 500)

          if [ -z "$ITEM_ID" ]; then
            echo "Issue #$ISSUE_NUMBER not found in project"
            exit 0
          fi

          # Update status to In Progress
          gh project item-edit \
            --project-id "PVT_kwDODacWQM4BBrgJ" \
            --id "$ITEM_ID" \
            --field-id "$STATUS_FIELD_ID" \
            --single-select-option-id "$IN_PROGRESS_ID"

          echo "Moved issue #$ISSUE_NUMBER to In Progress"
