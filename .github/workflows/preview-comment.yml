name: Preview URL Comment

on:
  check_run:
    types: [completed]

jobs:
  comment-preview-url:
    # Only run for Cloudflare Workers stg builds on PRs
    if: |
      github.event.check_run.app.slug == 'cloudflare-workers-and-pages' &&
      github.event.check_run.conclusion == 'success' &&
      contains(github.event.check_run.name, 'frontend-stg') &&
      github.event.check_run.pull_requests != ''
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Get Preview URL from Cloudflare API
        id: preview
        env:
          CF_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          # Get latest version for the worker
          RESPONSE=$(curl -s -X GET \
            "https://api.cloudflare.com/client/v4/accounts/${CF_ACCOUNT_ID}/workers/scripts/frontend-stg/versions" \
            -H "Authorization: Bearer ${CF_API_TOKEN}" \
            -H "Content-Type: application/json")

          # Extract the latest version ID (first 8 chars used in preview URL)
          VERSION_ID=$(echo "$RESPONSE" | jq -r '.result[0].id' | cut -c1-8)

          if [ "$VERSION_ID" = "null" ] || [ -z "$VERSION_ID" ]; then
            echo "Failed to get version ID"
            echo "$RESPONSE" | jq .
            exit 1
          fi

          # Get the workers.dev subdomain
          SUBDOMAIN_RESPONSE=$(curl -s -X GET \
            "https://api.cloudflare.com/client/v4/accounts/${CF_ACCOUNT_ID}/workers/subdomain" \
            -H "Authorization: Bearer ${CF_API_TOKEN}")

          SUBDOMAIN=$(echo "$SUBDOMAIN_RESPONSE" | jq -r '.result.subdomain')

          PREVIEW_URL="https://${VERSION_ID}-frontend-stg.${SUBDOMAIN}.workers.dev"
          echo "preview_url=${PREVIEW_URL}" >> "$GITHUB_OUTPUT"
          echo "Preview URL: ${PREVIEW_URL}"

      - name: Comment Preview URL
        uses: actions/github-script@v7
        with:
          script: |
            const previewUrl = '${{ steps.preview.outputs.preview_url }}';
            const prs = context.payload.check_run.pull_requests;

            if (!prs || prs.length === 0) {
              console.log('No pull requests associated with this check run');
              return;
            }

            const prNumber = prs[0].number;

            const body = `## Cloudflare Workers Preview

            | Preview URL |
            |-------------|
            | ${previewUrl} |

            Deployed commit: \`${context.payload.check_run.head_sha.substring(0, 7)}\``;

            // Find existing comment
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
            });

            const botComment = comments.find(comment =>
              comment.user.type === 'Bot' &&
              comment.body.includes('Cloudflare Workers Preview')
            );

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body,
              });
            }
