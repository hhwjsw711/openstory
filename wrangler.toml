#:schema node_modules/wrangler/config-schema.json
name = "velro"
compatibility_date = "2024-11-18"
pages_build_output_dir = ".vercel/output/static"

# Cloudflare Pages configuration for Next.js
# Built with @cloudflare/next-on-pages

# R2 Storage bindings
# Access via: env.VELRO_STORAGE (in edge runtime)
[[r2_buckets]]
binding = "VELRO_STORAGE"
bucket_name = "velro-storage"
preview_bucket_name = "velro-storage-dev"

# Environment variables (for local development)
# Production secrets should be set via:
#   wrangler secret put <KEY_NAME>
# Or via Cloudflare dashboard: Workers & Pages > velro > Settings > Environment variables

# Note: Do not commit secrets to this file!
# Use .dev.vars for local development (gitignored)
# Use wrangler secret put or dashboard for production

# Required environment variables (set via secrets):
# - TURSO_DATABASE_URL
# - TURSO_AUTH_TOKEN
# - BETTER_AUTH_SECRET
# - APP_URL (or use CF_PAGES_URL)
# - R2_ACCOUNT_ID
# - R2_ACCESS_KEY_ID
# - R2_SECRET_ACCESS_KEY
# - R2_BUCKET_NAME
# - QSTASH_TOKEN
# - QSTASH_URL
# - QSTASH_CURRENT_SIGNING_KEY
# - QSTASH_NEXT_SIGNING_KEY
# - FAL_KEY
# - OPENROUTER_API_KEY
# - CEREBRAS_API_KEY
# - GOOGLE_CLIENT_ID
# - GOOGLE_CLIENT_SECRET
# - RESEND_API_KEY

# Compatibility flags for Next.js edge runtime
# See: https://developers.cloudflare.com/workers/configuration/compatibility-dates/
compatibility_flags = ["nodejs_compat"]

# Observability settings
[observability]
enabled = true

# Build configuration
# Run: bunx @cloudflare/next-on-pages
# Deploy: wrangler pages deploy .vercel/output/static

# For local development:
# bun run dev (uses Next.js dev server)
# For Cloudflare Workers local testing:
# wrangler pages dev .vercel/output/static --compatibility-flag=nodejs_compat

# Preview environments
# Cloudflare Pages automatically creates preview deployments for branches
# Preview URLs: https://<branch>.<project>.pages.dev
