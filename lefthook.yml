colors: false

pre-push:
  commands:
    lint:
      glob: '*.{js,ts,cjs,mjs,d.cts,d.mts,jsx,tsx}'
      run: bunx oxlint --type-aware {push_files}
    format:
      glob: '*.{js,ts,cjs,mjs,d.cts,d.mts,jsx,tsx,json,jsonc,md,yml,yaml}'
      run: bunx prettier --no-color --check {push_files}

pre-commit:
  commands:
    lint:
      glob: '*.{js,ts,cjs,mjs,d.cts,d.mts,jsx,tsx}'
      run: bunx oxlint --type-aware --fix {staged_files}
      stage_fixed: true
    format:
      glob: '*.{js,ts,cjs,mjs,d.cts,d.mts,jsx,tsx,json,jsonc,md,yml,yaml}'
      run: bunx prettier --no-color --write {staged_files}
      stage_fixed: true
    typecheck:
      glob: '*.{ts,tsx,mts,cts}'
      run: bun tsc --noEmit --skipLibCheck
